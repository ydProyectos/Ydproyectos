<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yd proyectos appweb</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.ico">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background: url("Fondo.jpg") center / cover no-repeat;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}

/* ===== SPLASH ===== */
#splash {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#splash video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===== SECCIONES ===== */
.section {
  display: none;
  min-height: 100vh;
  padding-top: 80px;
  padding-bottom: 40px;
  flex-direction: column;
  align-items: center;
}

/* ===== BOTONES ===== */
.button-box {
  margin-bottom: 28px;
}

.button-box img {
  width: 220px;
  border-radius: 16px;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

.button-box span {
  display: block;
  margin-top: 8px;
  font-weight: bold;
}

/* ===== BOTÓN INSTALAR ===== */
#installBtn {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 20000;
  padding: 10px 16px;
  border-radius: 999px;
  border: none;
  background: #0a1a2f;
  color: white;
  font-weight: bold;
  display: none;
}

/* ===== VIDEO FULL ===== */
#videoFull {
  display: none;
  position: fixed;
  inset: 0;
  background: black;
  z-index: 10000;
}

#videoFull video {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

#backBtn {
  position: absolute;
  top: 16px;
  left: 16px;
  z-index: 10001;
  padding: 10px 14px;
  border-radius: 999px;
  border: none;
  background: rgba(0,0,0,0.7);
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <video autoplay muted playsinline id="introVideo">
    <source src="intro.mp4" type="video/mp4">
  </video>
</div>

<!-- BOTÓN INSTALAR -->
<button id="installBtn">📲 App</button>

<!-- MENÚ -->
<div id="menu" class="section">
  <h1>Yd proyectos app 🚀</h1>

  <div class="button-box">
    <img src="boton 1.png" id="btn1">
    <span>Presentación</span>
  </div>

  <div class="button-box">
    <img src="boton 2.png" id="btn2">
    <span>Insta Army</span>
  </div>

  <div class="button-box">
    <img src="boton 3.png" id="btn3">
    <span>Confitería</span>
  </div>
</div>

<!-- VIDEO FULL -->
<div id="videoFull">
  <button id="backBtn">⬅ Regresar</button>
  <video id="fullVideo" controls></video>
</div>

<script>
/* SPLASH */
const splash = document.getElementById("splash");
const menu = document.getElementById("menu");
const intro = document.getElementById("introVideo");

intro.onended = () => {
  splash.style.display = "none";
  menu.style.display = "flex";
};

/* ===== VIDEO FULL ===== */
const videoFull = document.getElementById("videoFull");
const fullVideo = document.getElementById("fullVideo");
const backBtn = document.getElementById("backBtn");

/* BOTÓN 3 – CONFITERÍA (4 VIDEOS) */
const confVideos = [
  "conf1.mp4",
  "conf2.mp4",
  "conf3.mp4",
  "conf4.mp4"
];

let index = 0;

document.getElementById("btn3").onclick = () => {
  index = 0;
  playConf();
};

function playConf() {
  fullVideo.src = confVideos[index];
  videoFull.style.display = "block";
  fullVideo.play();
}

fullVideo.onended = () => {
  if (index < confVideos.length - 1) {
    index++;
    playConf();
  }
};

backBtn.onclick = () => {
  fullVideo.pause();
  videoFull.style.display = "none";
};

/* BOTÓN INSTALAR */
let deferredPrompt;
const installBtn = document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = "block";
});

installBtn.onclick = async () => {
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  installBtn.style.display = "none";
};
</script>

</body>
</html>
