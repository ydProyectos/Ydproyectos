<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yd proyectos appweb</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.ico">

<style>
/* ===== RESET ===== */
* { box-sizing: border-box; }

/* ===== FONDO ===== */
body {
  margin: 0;
  min-height: 100vh;
  background: url("Fondo.jpg") center / cover no-repeat;
  font-family: Arial, sans-serif;
  color: white;
}

/* ===== APP ===== */
#app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 80px;
}

/* ===== BOTONES ===== */
.button-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 28px;
}

.button-box img {
  width: 220px;
  border-radius: 16px;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

.button-box span {
  margin-top: 8px;
  font-weight: bold;
  font-size: 16px;
}

/* ===== VIDEO FULL ===== */
#videoFull {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  flex-direction: column;
  z-index: 9999;
}

#videoFull video {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* ===== BOTÓN REGRESAR ===== */
#backBtn {
  position: absolute;
  top: 16px;
  left: 16px;
  padding: 10px 14px;
  background: rgba(0,0,0,0.7);
  color: white;
  border-radius: 999px;
  font-weight: bold;
  cursor: pointer;
  z-index: 10000;
}
</style>
</head>

<body>

<div id="app">
  <h1>Yd proyectos app 🚀</h1>

  <!-- BOTÓN 1 -->
  <div class="button-box">
    <img src="boton 1.png" id="btn1">
    <span>Presentación</span>
  </div>

  <!-- BOTÓN 2 -->
  <div class="button-box">
    <img src="boton 2.png" id="btn2">
    <span>Insta Army</span>
  </div>

  <!-- BOTÓN 3 -->
  <div class="button-box">
    <img src="boton 3.png" id="btn3">
    <span>Confitería</span>
  </div>
</div>

<!-- VIDEO FULLSCREEN -->
<div id="videoFull">
  <div id="backBtn">⬅ Regresar</div>
  <video id="fullVideo" playsinline controls></video>
</div>

<script>
const videoFull = document.getElementById("videoFull");
const fullVideo = document.getElementById("fullVideo");
const backBtn = document.getElementById("backBtn");

/* ===== LISTA CONFITERÍA (4 VIDEOS) ===== */
const confVideos = [
  "conf1.mp4",
  "conf2.mp4",
  "conf3.mp4",
  "conf4.mp4"
];

let currentIndex = 0;

/* ===== BOTÓN 3 ===== */
document.getElementById("btn3").addEventListener("click", () => {
  currentIndex = 0;
  playConfVideo();
});

/* ===== REPRODUCIR CADENA ===== */
function playConfVideo() {
  fullVideo.src = confVideos[currentIndex];
  videoFull.style.display = "flex";
  fullVideo.muted = false;
  fullVideo.play();
}

fullVideo.onended = () => {
  if (currentIndex < confVideos.length - 1) {
    currentIndex++;
    playConfVideo();
  }
};

/* ===== REGRESAR ===== */
backBtn.addEventListener("click", () => {
  fullVideo.pause();
  fullVideo.src = "";
  videoFull.style.display = "none";
});
</script>

</body>
</html>
